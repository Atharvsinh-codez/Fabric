name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FABRIC_ENV: local
      AUTH_SECRET: ci-only-secret-that-is-never-deployed
      AUTH_GOOGLE_ID: ci-google-id
      AUTH_GOOGLE_SECRET: ci-google-secret
      AUTH_GITHUB_ID: ci-github-id
      AUTH_GITHUB_SECRET: ci-github-secret
      DATABASE_URL: postgresql://fabric:fabric@127.0.0.1:5432/fabric
      DATABASE_URL_DIRECT: postgresql://fabric:fabric@127.0.0.1:5432/fabric
      REALTIME_DATABASE_URL: postgresql://fabric-realtime:fabric@127.0.0.1:5432/fabric
      WORKER_DATABASE_URL: postgresql://fabric-worker:fabric@127.0.0.1:5432/fabric
      AI_PROVIDER: openai-compatible
      AI_BASE_URL: https://api.example.test/v1
      AI_API_KEY: ci-only-provider-key
      AI_MODEL: gcli/grok-4.5-medium
      AI_STREAM_ONLY: "true"
      AI_RUNS_ENABLED: "false"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify pinned tldraw invariants
        run: npm run verify:tldraw

      - name: Run tests
        run: npm run test

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Check realtime runtime types
        run: npm run realtime:typecheck

      - name: Check Cloudflare realtime Worker types
        run: npm run realtime:worker:typecheck

      - name: Run Cloudflare realtime Worker tests
        run: npm run realtime:worker:test

      - name: Check generated Cloudflare bindings
        run: npm run realtime:worker:types

      - name: Check AI worker runtime types
        run: npm run ai-worker:typecheck

      - name: Validate database migration metadata
        run: npm run db:check

      - name: Run lint
        run: npm run lint

      - name: Build production application
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Validate Cloudflare production bundle
        run: npx wrangler deploy --dry-run

      - name: Validate Cloudflare development bundle
        run: npx wrangler deploy --dry-run --env dev
